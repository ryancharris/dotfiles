# Aerospace window manager config
# Docs: https://nikitabobko.github.io/AeroSpace/guide

after-login-command = []
after-startup-command = []

start-at-login = true

# Required to make the 'split' command work
enable-normalization-flatten-containers = false

# Gaps between windows and screen edges
[gaps]
inner.horizontal = 16
inner.vertical   = 16
outer.left       = 16
outer.bottom     = 16
outer.top        = 16
outer.right      = 16

# ── Key bindings ──────────────────────────────────────────────────────────────
# Main modifier. alt (option) keeps cmd free for app shortcuts.
[mode.main.binding]

# Focus
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Move windows
ctrl-alt-h = 'move left'
ctrl-alt-j = 'move down'
ctrl-alt-k = 'move up'
ctrl-alt-l = 'move right'

# Split direction — mirrors cmd+shift+h/v in Kitty/Ghostty
alt-shift-h = 'split horizontal'  # side-by-side (mirrors cmd+shift+h)
alt-shift-v = 'split vertical'    # stacked      (mirrors cmd+shift+v)

# Fullscreen / float toggle
alt-u = 'fullscreen'
alt-shift-u = 'layout floating tiling'

# Resize mode
alt-r = 'mode resize'

# Layouts
alt-semicolon = 'layout tiles horizontal vertical'
alt-p = 'layout accordion horizontal vertical'

# Reload config without restart
alt-shift-semicolon = 'reload-config'

# Switch workspaces
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'
alt-0 = 'workspace 10'

# Move focused window to workspace
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'
alt-shift-0 = 'move-node-to-workspace 10'


[mode.resize.binding]
h = 'resize width -50'
l = 'resize width +50'
k = 'resize height -50'
j = 'resize height +50'
minus  = 'resize smart -50'
equal  = 'resize smart +50'
enter  = 'mode main'
esc    = 'mode main'

