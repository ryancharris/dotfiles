prSections:
    - title: '✍️ by me'
      filters: is:open author:@me
    - title: '📥 @me'
      filters: is:open review-requested:@me OR mentions:@me -reviewed-by:@me
    - title: '🤝 @dbt-labs/transport'
      filters: is:open team-review-requested:dbt-labs/transport -reviewed-by:@me -author:@me
    - title: '🚛 transporters'
      filters: is:open author:eiof author:cbosss author:ben-fowler-cloud author:natty-li author:mringle-dbtlabs -reviewed-by:@me
    - title: '🇮🇪 mringle'
      filters: is:open author:mringle-dbtlabs -reviewed-by:@me
issuesSections:
    - title: My Issues
      filters: is:open author:@me
    - title: Assigned
      filters: is:open assignee:@me
    - title: Involved
      filters: is:open involves:@me -author:@me
notificationsSections:
    - title: All
      filters: ""
    - title: Created
      filters: reason:author
    - title: Participating
      filters: reason:participating
    - title: Mentioned
      filters: reason:mention
    - title: Review Requested
      filters: reason:review-requested
    - title: Assigned
      filters: reason:assign
    - title: Subscribed
      filters: reason:subscribed
    - title: Team Mentioned
      filters: reason:team-mention
repo:
    branchesRefetchIntervalSeconds: 30
    prsRefetchIntervalSeconds: 60
defaults:
    preview:
        open: true
        width: 0.45
    prsLimit: 20
    prApproveComment: LGTM
    issuesLimit: 20
    notificationsLimit: 20
    view: prs
    dateFormat: "2006-01-02"
    layout:
        prs:
            updatedAt:
                hidden: true
            createdAt:
                hidden: true
            repo:
                width: 20
            author:
                width: 15
            authorIcon:
                hidden: false
            assignees:
                width: 20
                hidden: true
            base:
                width: 15
                hidden: true
            lines:
                width: 15
            ciStatus:
                width: 3
            reviewDecision:
                width: 10
        issues:
            updatedAt:
                width: 5
            createdAt:
                width: 5
            repo:
                width: 15
            creator:
                width: 10
            creatorIcon:
                hidden: false
            assignees:
                width: 20
                hidden: true
    refetchIntervalMinutes: 30
keybindings:
    prs:
        - key: x
          name: review in cursor
          command: "kitty @ launch --location=vsplit --cwd {{.RepoPath}} bash -c 'gh pr checkout {{.PrNumber}} && cursor . && exec bash'"
repoPaths:
    ryancharris/dotfiles: ~/dotfiles
    ":owner/:repo": ~/git/:repo
theme:
    ui:
        sectionsShowCount: true
        table:
            showSeparator: true
            compact: true
pager:
    diff: diffnav
confirmQuit: false
showAuthorIcons: true
smartFilteringAtLaunch: false
includeReadNotifications: true
